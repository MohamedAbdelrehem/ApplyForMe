<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Fursa Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F5F2EC;
      --s1:#FFFFFF;--s2:#F0EDE6;--s3:#E4E0D6;
      --t1:#1A1612;--t2:#6B6358;--t3:#A09890;
      --acc:#C84B2F;--acc-d:#A83820;--acc-bg:rgba(200,75,47,.08);--acc-bd:rgba(200,75,47,.22);
      --grn:#2D7A4F;--grn-bg:rgba(45,122,79,.08);--grn-bd:rgba(45,122,79,.22);
      --blu:#2563EB;--blu-bg:rgba(37,99,235,.08);--blu-bd:rgba(37,99,235,.22);
      --pur:#5B4FCF;--pur-bg:rgba(91,79,207,.1);
      --ylw:#A0620A;--ylw-bg:rgba(160,98,10,.08);
      --bd:rgba(60,50,30,.10);--bd2:rgba(60,50,30,.18);
      --glow:0 0 0 1px rgba(200,75,47,.2),0 4px 16px rgba(200,75,47,.1);
      --card-shadow:0 1px 2px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
    }
    html{color-scheme:light;}
    body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;}

    /* ── AUTH GATE ── */
    #auth-gate{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(224,90,53,.08) 0%,transparent 70%);
    }
    .gate-box{
      background:var(--s1);border:1px solid var(--bd2);border-radius:20px;
      padding:40px 36px;width:100%;max-width:360px;text-align:center;
      box-shadow:var(--card-shadow);
      animation:fadeUp .4s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .gate-logo{width:56px;height:56px;border-radius:16px;margin-bottom:18px;box-shadow:0 4px 16px rgba(224,90,53,.3);}
    .gate-title{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px;}
    .gate-sub{font-size:13px;color:var(--t3);margin-bottom:28px;font-family:'DM Mono',monospace;}
    .gate-inp{
      width:100%;padding:13px 16px;border:1.5px solid var(--bd2);border-radius:12px;
      font-size:15px;background:var(--s2);color:var(--t1);margin-bottom:12px;
      outline:none;font-family:'Sora',sans-serif;transition:border-color .2s;letter-spacing:.05em;
    }
    .gate-inp:focus{border-color:var(--acc);box-shadow:var(--glow);}
    .gate-btn{
      width:100%;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:12px;
      font-size:15px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;
      transition:background .15s,transform .1s;letter-spacing:-.1px;
    }
    .gate-btn:hover{background:var(--acc-d);}
    .gate-btn:active{transform:scale(.98);}
    .gate-err{color:var(--acc);font-size:12px;margin-top:10px;font-family:'DM Mono',monospace;}

    /* ── DASHBOARD ── */
    #dashboard{display:none;animation:fadeUp .3s ease both;}
    .dash-header{
      background:rgba(15,14,12,.85);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--bd);padding:12px 24px;
      display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;
    }
    .dash-logo{width:26px;height:26px;border-radius:7px;}
    .dash-wordmark{font-size:13px;font-weight:700;flex:1;letter-spacing:-.2px;}
    .dash-wordmark span{color:var(--t3);font-weight:400;font-family:'DM Mono',monospace;font-size:11px;margin-left:8px;}
    .dash-meta{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;margin-right:4px;}
    .dash-btn{
      font-size:12px;color:var(--t3);cursor:pointer;padding:6px 12px;
      border-radius:8px;background:none;border:1px solid var(--bd);font-family:'Sora',sans-serif;
      transition:all .15s;
    }
    .dash-btn:hover{color:var(--t1);border-color:var(--bd2);background:var(--s2);}
    .dash-btn.danger:hover{color:var(--acc);border-color:var(--acc-bd);}
    .dash-body{max-width:1280px;margin:0 auto;padding:28px 24px;}

    /* ── TABS ── */
    .tab-row{display:flex;gap:2px;margin-bottom:24px;background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:4px;}
    .tab-btn{
      flex:1;padding:8px 16px;font-size:13px;font-weight:600;border:none;background:none;
      cursor:pointer;color:var(--t3);border-radius:9px;font-family:'Sora',sans-serif;
      transition:all .2s;letter-spacing:-.1px;
    }
    .tab-btn.active{background:var(--s3);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.3);}
    .tab-btn:hover:not(.active){color:var(--t2);}

    /* ── STATS GRID ── */
    .stats-section{margin-bottom:28px;}
    .section-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;font-family:'DM Mono',monospace;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}
    .stat-card{
      background:var(--s1);border:1px solid var(--bd);border-radius:14px;
      padding:16px 18px;transition:border-color .2s,transform .15s;cursor:default;
      position:relative;overflow:hidden;
    }
    .stat-card::after{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(255,255,255,.025),transparent);
      pointer-events:none;
    }
    .stat-card:hover{border-color:var(--bd2);transform:translateY(-1px);}
    .stat-card.hi{border-color:var(--acc-bd);background:linear-gradient(135deg,var(--s1) 60%,rgba(224,90,53,.06));}
    .stat-label{font-size:10px;color:var(--t3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px;font-family:'DM Mono',monospace;}
    .stat-value{font-size:28px;font-weight:700;color:var(--t1);line-height:1;letter-spacing:-1px;}
    .stat-diff{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;margin-top:6px;padding:3px 8px;border-radius:99px;font-family:'DM Mono',monospace;}
    .diff-up  {background:var(--grn-bg);color:var(--grn);}
    .diff-dn  {background:var(--acc-bg);color:var(--acc);}
    .diff-zero{background:var(--s2);color:var(--t3);}

    /* ── PANELS ── */
    .two-col{display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start;}
    @media(max-width:900px){.two-col{grid-template-columns:1fr;}}
    .panel{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;box-shadow:var(--card-shadow);}
    .panel-hdr{
      padding:13px 18px;border-bottom:1px solid var(--bd);
      font-size:13px;font-weight:700;display:flex;align-items:center;
      justify-content:space-between;gap:8px;flex-wrap:wrap;letter-spacing:-.2px;
    }
    .panel-hdr-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .panel-count{font-size:11px;color:var(--t3);font-weight:400;font-family:'DM Mono',monospace;}

    /* ── FILTERS ── */
    .filter-row{display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);}
    .filter-inp{
      flex:1;padding:8px 12px;border:1.5px solid var(--bd);border-radius:8px;
      font-size:13px;background:var(--s2);color:var(--t1);outline:none;
      font-family:'Sora',sans-serif;transition:border-color .2s;
    }
    .filter-inp:focus{border-color:var(--acc);}
    .filter-inp::placeholder{color:var(--t3);}
    .icon-btn{
      padding:7px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;
      font-size:12px;cursor:pointer;color:var(--t2);font-family:'Sora',sans-serif;white-space:nowrap;
      transition:all .15s;
    }
    .icon-btn:hover{background:var(--s3);color:var(--t1);}
    select.icon-btn option{background:var(--s2);color:var(--t1);}
    .export-btn{
      padding:7px 14px;background:var(--grn-bg);border:1px solid var(--grn-bd);
      border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--grn);
      font-family:'Sora',sans-serif;transition:all .15s;
    }
    .export-btn:hover{background:rgba(61,189,114,.18);}

    /* ── TABLE — horizontal scroll ── */
    .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .table-scroll::-webkit-scrollbar{height:4px;}
    .table-scroll::-webkit-scrollbar-track{background:transparent;}
    .table-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
    table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px;}
    thead{background:var(--s2);}
    th{
      padding:10px 16px;text-align:left;font-weight:600;font-size:10px;color:var(--t3);
      text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--bd);
      white-space:nowrap;font-family:'DM Mono',monospace;position:sticky;top:0;background:var(--s2);
    }
    td{padding:11px 16px;border-bottom:1px solid var(--bd);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(255,255,255,.02);}
    .user-cell{display:flex;align-items:center;gap:10px;}
    .u-avatar{
      width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;
      background:var(--s3);display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:var(--t2);border:1px solid var(--bd);
    }
    .u-name{font-weight:600;font-size:13px;white-space:nowrap;}
    .u-email{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;white-space:nowrap;}
    .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;}
    .pill-grn {background:var(--grn-bg);color:var(--grn);}
    .pill-gray{background:var(--s2);color:var(--t3);}
    .pill-blu {background:var(--blu-bg);color:var(--blu);}
    .pill-acc {background:var(--acc-bg);color:var(--acc);}
    .detail-btn{
      padding:5px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;
      font-size:11px;cursor:pointer;color:var(--t2);font-family:'Sora',sans-serif;
      transition:all .15s;white-space:nowrap;
    }
    .detail-btn:hover{background:var(--s3);color:var(--t1);border-color:var(--bd2);}

    /* ── EVENTS ── */
    .event-list{max-height:520px;overflow-y:auto;}
    .event-list::-webkit-scrollbar{width:3px;}
    .event-list::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
    .event-item{
      display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd);
      align-items:flex-start;transition:background .1s;
    }
    .event-item:last-child{border-bottom:none;}
    .event-item:hover{background:rgba(255,255,255,.02);}
    .ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
    .ev-dot-draft  {background:var(--pur);}
    .ev-dot-sent   {background:var(--grn);}
    .ev-dot-copy   {background:#E879A0;}
    .ev-dot-save   {background:var(--acc);}
    .ev-dot-cv     {background:var(--ylw);}
    .ev-dot-signin {background:var(--blu);}
    .ev-dot-share  {background:#22CDB0;}
    .ev-dot-open   {background:var(--t3);}
    .ev-dot-gate   {background:#C07040;}
    .ev-type{font-size:12px;font-weight:600;color:var(--t1);}
    .ev-meta{font-size:11px;color:var(--t3);margin-top:1px;font-family:'DM Mono',monospace;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
    .ev-time{font-size:10px;color:var(--t3);margin-left:auto;white-space:nowrap;padding-top:3px;flex-shrink:0;font-family:'DM Mono',monospace;}

    /* ── DETAIL PANEL ── */
    #detail-panel{
      position:fixed;right:0;top:0;bottom:0;width:440px;
      background:var(--s1);border-left:1px solid var(--bd);
      overflow-y:auto;z-index:200;
      transform:translateX(100%);transition:transform .28s cubic-bezier(.22,.84,.4,1);
      box-shadow:-8px 0 40px rgba(0,0,0,.4);
    }
    #detail-panel.open{transform:none;}
    #detail-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;
      opacity:0;pointer-events:none;transition:opacity .28s;backdrop-filter:blur(2px);
    }
    #detail-overlay.show{opacity:1;pointer-events:auto;}
    .dp-hdr{
      padding:16px 20px;border-bottom:1px solid var(--bd);
      display:flex;align-items:center;gap:12px;
      position:sticky;top:0;background:var(--s1);z-index:1;
    }
    .dp-avatar{
      width:40px;height:40px;border-radius:50%;background:var(--s3);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;color:var(--t2);flex-shrink:0;border:1px solid var(--bd);
    }
    .dp-close{
      margin-left:auto;width:30px;height:30px;font-size:18px;cursor:pointer;
      color:var(--t3);line-height:1;padding:0;background:var(--s2);
      border:1px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;
      transition:all .15s;flex-shrink:0;
    }
    .dp-close:hover{color:var(--t1);border-color:var(--bd2);}
    .dp-section{padding:16px 20px;border-bottom:1px solid var(--bd);}
    .dp-stitle{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;font-family:'DM Mono',monospace;}
    .kv{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:16px;}
    .kv-k{font-size:12px;color:var(--t3);white-space:nowrap;flex-shrink:0;}
    .kv-v{font-size:12px;font-weight:500;color:var(--t1);text-align:right;word-break:break-word;font-family:'DM Mono',monospace;}
    .kv-v a{color:var(--blu);text-decoration:none;}
    .kv-v a:hover{text-decoration:underline;}
    .draft-item{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:7px;}
    .dr-co{font-size:12px;font-weight:700;}
    .dr-role{font-size:11px;color:var(--t2);margin-top:1px;}
    .dr-st{font-size:11px;color:var(--t3);margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .dr-badge{padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;}
    .dr-badge-draft{background:var(--s3);color:var(--t3);}
    .dr-badge-sent {background:var(--grn-bg);color:var(--grn);}
    .dr-badge-sched{background:var(--blu-bg);color:var(--blu);}
    .link-item{font-size:12px;padding:8px 0;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:flex-start;}
    .link-item:last-child{border-bottom:none;}
    .link-co{font-weight:600;}
    .link-url{color:var(--blu);text-decoration:none;font-size:11px;word-break:break-all;font-family:'DM Mono',monospace;}
    .link-url:hover{text-decoration:underline;}

    /* ── LOADING / EMPTY ── */
    .loading{text-align:center;padding:48px 20px;color:var(--t3);font-size:13px;}
    .spinner{
      width:24px;height:24px;border-radius:50%;border:2px solid var(--s3);
      border-top-color:var(--acc);animation:spin .7s linear infinite;margin:0 auto 12px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:36px 20px;color:var(--t3);font-size:13px;font-family:'DM Mono',monospace;}

    /* ── BADGE CHIP for platform ── */
    .chip{
      display:inline-flex;align-items:center;gap:5px;padding:3px 9px;
      border-radius:99px;font-size:11px;font-weight:500;background:var(--s2);
      border:1px solid var(--bd);color:var(--t2);font-family:'DM Mono',monospace;
    }

    /* ── SEARCH HIGHLIGHT ── */
    mark{background:rgba(224,90,53,.25);color:var(--acc);border-radius:2px;padding:0 2px;}

    /* ── MINI SPARKBAR ── */
    .spark{display:flex;align-items:flex-end;gap:2px;height:20px;}
    .spark-b{width:4px;background:var(--acc);border-radius:2px 2px 0 0;opacity:.7;transition:opacity .2s;}
    .spark-b:hover{opacity:1;}

    /* ── ACTIVITY BADGE ── */
    .act-badge{
      display:inline-flex;align-items:center;gap:4px;font-size:10px;
      font-family:'DM Mono',monospace;padding:2px 8px;border-radius:99px;
    }
    .act-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;}
    .act-live{background:var(--grn-bg);color:var(--grn);}
    .act-week{background:var(--ylw-bg);color:var(--ylw);}
    .act-cold{background:var(--s2);color:var(--t3);}

    /* ── GUEST TABLE specific ── */
    .ev-tags{display:flex;flex-wrap:wrap;gap:4px;}
    .ev-tag{padding:2px 7px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;white-space:nowrap;}

    /* ── SCROLLBAR global ── */
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}
  </style>
</head>
<body>

<!-- ── AUTH GATE ── -->
<div id="auth-gate">
  <div class="gate-box">
    <img src="icons/icon-192.png" class="gate-logo" alt="Fursa"/>
    <div class="gate-title">Fursa Admin</div>
    <div class="gate-sub">// owner access only</div>
    <input type="password" class="gate-inp" id="pw-inp" placeholder="Admin password" autocomplete="current-password"/>
    <button class="gate-btn" onclick="checkPw()">Enter →</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="dash-header">
    <img src="icons/icon-192.png" class="dash-logo" alt=""/>
    <div class="dash-wordmark">Fursa <span>admin</span></div>
    <span class="dash-meta" id="last-refresh"></span>
    <button class="dash-btn" onclick="loadAll()">↺ Refresh</button>
    <button class="dash-btn danger" onclick="signOut()">Sign out</button>
  </div>

  <div class="dash-body">

    <div class="stats-section">
      <div class="section-label">Overview — this week vs last week</div>
      <div class="stats-grid">
        <div class="stat-card hi"><div class="stat-label">Registered users</div><div class="stat-value" id="st-users">—</div></div>
        <div class="stat-card">   <div class="stat-label">Guest sessions</div><div class="stat-value" id="st-guests">—</div></div>
        <div class="stat-card">   <div class="stat-label">New users (7d)</div><div class="stat-value" id="st-new">—</div><div id="st-new-diff"></div></div>
        <div class="stat-card">   <div class="stat-label">Total drafts</div><div class="stat-value" id="st-total-drafts">—</div></div>
        <div class="stat-card">   <div class="stat-label">Total sent</div><div class="stat-value" id="st-total-sent">—</div></div>
        <div class="stat-card">   <div class="stat-label">Drafts (7d)</div><div class="stat-value" id="st-drafts">—</div><div id="st-drafts-diff"></div></div>
        <div class="stat-card">   <div class="stat-label">Emails sent (7d)</div><div class="stat-value" id="st-sent">—</div><div id="st-sent-diff"></div></div>
        <div class="stat-card">   <div class="stat-label">CV uploads (7d)</div><div class="stat-value" id="st-cvs">—</div><div id="st-cvs-diff"></div></div>
        <div class="stat-card">   <div class="stat-label">Sign-ins (7d)</div><div class="stat-value" id="st-signins">—</div><div id="st-signins-diff"></div></div>
      </div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('users')"  id="tab-users">Users</button>
      <button class="tab-btn"        onclick="switchTab('events')" id="tab-events">Live Events</button>
      <button class="tab-btn"        onclick="switchTab('guests')" id="tab-guests">Guests</button>
    </div>

    <!-- ── USERS TAB ── -->
    <div id="tab-pane-users">
      <div class="two-col">
        <div class="panel">
          <div class="panel-hdr">
            Users <span class="panel-count" id="user-count-lbl"></span>
            <div class="panel-hdr-right">
              <select class="icon-btn" id="sort-sel" onchange="applySortFilter()">
                <option value="lastActive">Last active</option>
                <option value="joined">Joined</option>
                <option value="drafts">Most drafts</option>
                <option value="sent">Most sent</option>
              </select>
              <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
            </div>
          </div>
          <div class="filter-row">
            <input class="filter-inp" id="search-inp" placeholder="Search name, email or title…" oninput="filterTable()"/>
          </div>
          <div class="table-scroll" id="table-wrap">
            <div class="loading"><div class="spinner"></div>Loading…</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-hdr">Live events <span class="panel-count" id="ev-count-lbl"></span></div>
          <div class="event-list" id="event-list">
            <div class="loading"><div class="spinner"></div>Loading…</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── EVENTS TAB ── -->
    <div id="tab-pane-events" style="display:none">
      <div class="panel">
        <div class="panel-hdr">
          All events <span class="panel-count" id="ev-full-count-lbl"></span>
          <div class="panel-hdr-right">
            <select class="icon-btn" id="ev-type-filter" onchange="filterEvents()">
              <option value="">All types</option>
              <option value="draft_generated">Draft generated</option>
              <option value="email_sent">Email sent</option>
              <option value="email_copied">Email copied</option>
              <option value="job_saved">Job saved</option>
              <option value="cv_uploaded">CV uploaded</option>
              <option value="sign_in">Sign in</option>
              <option value="share_received">Share received</option>
              <option value="app_open">App opened</option>
              <option value="onboarding_completed">Onboarding done</option>
              <option value="profile_gate_completed">Profile gate done</option>
              <option value="profile_gate_dismissed">Profile gate skipped</option>
            </select>
          </div>
        </div>
        <div class="event-list" style="max-height:none" id="event-list-full"></div>
      </div>
    </div>

    <!-- ── GUESTS TAB ── -->
    <div id="tab-pane-guests" style="display:none">
      <div class="panel">
        <div class="panel-hdr">Guest sessions <span class="panel-count" id="guest-count-lbl"></span></div>
        <div class="table-scroll" id="guests-wrap">
          <div class="loading"><div class="spinner"></div>Loading…</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── DETAIL OVERLAY + PANEL ── -->
<div id="detail-overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="dp-hdr">
    <div class="dp-avatar" id="dp-avatar">?</div>
    <div>
      <div style="font-size:14px;font-weight:700;letter-spacing:-.2px" id="dp-name"></div>
      <div style="font-size:11px;color:var(--t3);font-family:'DM Mono',monospace" id="dp-email"></div>
    </div>
    <button class="dp-close" onclick="closeDetail()">×</button>
  </div>
  <div id="dp-body"></div>
</div>

<script type="module">
// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
let _adminPassword = '';
let _allUsers      = [];
let _allEvents     = [];
let _allGuests     = [];
const WEEK  = 7  * 86400_000;
const WEEK2 = 14 * 86400_000;

// FIX #5: use function instead of constant so stats stay fresh after auto-refresh
function now() { return Date.now(); }

// ════════════════════════════════════════════════════════════════
// AUTH GATE
// ════════════════════════════════════════════════════════════════
window.checkPw = async () => {
  const pw  = document.getElementById('pw-inp').value.trim();
  if (!pw) return;
  const btn = document.querySelector('.gate-btn');
  btn.textContent = 'Checking…'; btn.disabled = true;
  try {
    const r = await fetch('/api/admin?action=users', { headers: { 'x-admin-password': pw } });
    if (r.status === 401) {
      document.getElementById('gate-err').textContent = 'Wrong password.';
      btn.textContent = 'Enter →'; btn.disabled = false; return;
    }
    if (!r.ok) throw new Error(await r.text());

    // FIX #1: store hash of password in sessionStorage, not the password itself.
    // We keep the raw pw only in memory (_adminPassword) for API calls.
    _adminPassword = pw;
    const pwHash = await hashPw(pw);
    sessionStorage.setItem('fursa_admin_pwh', pwHash);
    sessionStorage.setItem('fursa_admin_pw_tmp', pw); // single-session only, cleared on signOut

    document.getElementById('auth-gate').style.display  = 'none';
    document.getElementById('dashboard').style.display = 'block';

    const data = await r.json();
    _allUsers = (data.users || []).sort((a,b) => (b.lastActiveAt||0) - (a.lastActiveAt||0));
    updateStats();
    renderTable(_allUsers);
    document.getElementById('user-count-lbl').textContent = _allUsers.length + ' total';

    // FIX #2: load events+guests properly and update sidebar event list
    await Promise.all([ loadEvents(), loadGuests() ]);
    setRefreshLabel();
  } catch(e) {
    document.getElementById('gate-err').textContent = 'Error: ' + e.message;
    btn.textContent = 'Enter →'; btn.disabled = false;
  }
};

async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

document.getElementById('pw-inp').addEventListener('keydown', e => { if(e.key==='Enter') window.checkPw(); });

// Restore session: use the temporarily stored raw pw (in-session only)
const _savedPw = sessionStorage.getItem('fursa_admin_pw_tmp');
if (_savedPw) { document.getElementById('pw-inp').value = _savedPw; window.checkPw(); }

window.signOut = () => {
  sessionStorage.removeItem('fursa_admin_pwh');
  sessionStorage.removeItem('fursa_admin_pw_tmp');
  location.reload();
};

// ════════════════════════════════════════════════════════════════
// DATA LOADING
// ════════════════════════════════════════════════════════════════
window.loadAll = async () => {
  document.getElementById('last-refresh').textContent = 'Loading…';
  try {
    const [uRes, eRes, gRes] = await Promise.all([
      fetch('/api/admin?action=users',  { headers: { 'x-admin-password': _adminPassword } }),
      fetch('/api/admin?action=events', { headers: { 'x-admin-password': _adminPassword } }),
      fetch('/api/admin?action=guests', { headers: { 'x-admin-password': _adminPassword } }),
    ]);
    _allUsers  = ((await uRes.json()).users  || []).sort((a,b) => (b.lastActiveAt||0) - (a.lastActiveAt||0));
    _allEvents = (await eRes.json()).events || [];
    _allGuests = (await gRes.json()).guests || [];
    updateStats();
    renderTable(_allUsers);
    renderEvents(_allEvents, 'event-list');
    renderEventsFullTab();
    renderGuests();
    document.getElementById('user-count-lbl').textContent = _allUsers.length + ' total';
    setRefreshLabel();
  } catch(e) {
    document.getElementById('last-refresh').textContent = 'Failed: ' + e.message;
  }
};

async function loadEvents() {
  try {
    const r = await fetch('/api/admin?action=events', { headers: { 'x-admin-password': _adminPassword } });
    if (!r.ok) return;
    _allEvents = (await r.json()).events || [];
    renderEvents(_allEvents, 'event-list');  // FIX #2: always render sidebar
    renderEventsFullTab();
    updateStats();
  } catch(_) {}
}

async function loadGuests() {
  try {
    const r = await fetch('/api/admin?action=guests', { headers: { 'x-admin-password': _adminPassword } });
    if (!r.ok) return;
    _allGuests = (await r.json()).guests || [];
    renderGuests();
    updateStats();
  } catch(_) {}
}

function setRefreshLabel() {
  document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

// FIX #6: skip auto-refresh if tab is hidden
setInterval(() => {
  if (_adminPassword && document.visibilityState !== 'hidden') loadAll();
}, 60_000);

// ════════════════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════════════════
window.switchTab = (name) => {
  ['users','events','guests'].forEach(t => {
    document.getElementById('tab-pane-' + t).style.display = t === name ? '' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
  });
};

// ════════════════════════════════════════════════════════════════
// STATS  (FIX #5: uses now() not a stale constant)
// ════════════════════════════════════════════════════════════════
function updateStats() {
  const N    = now();
  const newTW = _allUsers.filter(u => u.createdAt && (N - u.createdAt) < WEEK).length;
  const newLW = _allUsers.filter(u => { const t=u.createdAt||0; return t>N-WEEK2 && t<=N-WEEK; }).length;

  const evTW = _allEvents.filter(e => (N - (e.ts||e.createdAt||0)) < WEEK);
  const evLW = _allEvents.filter(e => { const t=e.ts||e.createdAt||0; return t>N-WEEK2 && t<=N-WEEK; });
  const cnt  = (evs, type) => evs.filter(e => e.type === type).length;

  const totalDrafts = [..._allUsers,..._allGuests].reduce((s,u) => s + (u._d?.drafts?.length ?? u.draftCount ?? 0), 0);
  const totalSent   = [..._allUsers,..._allGuests].reduce((s,u) => s + (u._d?.stats?.sent   ?? u.sentCount  ?? 0), 0);

  document.getElementById('st-users').textContent        = _allUsers.length;
  document.getElementById('st-guests').textContent       = _allGuests.length;
  document.getElementById('st-total-drafts').textContent = totalDrafts;
  document.getElementById('st-total-sent').textContent   = totalSent;
  setStat('st-new',     newTW,                        diff(newTW, newLW));
  setStat('st-drafts',  cnt(evTW,'draft_generated'),  diff(cnt(evTW,'draft_generated'), cnt(evLW,'draft_generated')));
  setStat('st-sent',    cnt(evTW,'email_sent'),       diff(cnt(evTW,'email_sent'),      cnt(evLW,'email_sent')));
  setStat('st-cvs',     cnt(evTW,'cv_uploaded'),      diff(cnt(evTW,'cv_uploaded'),     cnt(evLW,'cv_uploaded')));
  setStat('st-signins', cnt(evTW,'sign_in'),          diff(cnt(evTW,'sign_in'),         cnt(evLW,'sign_in')));
}

function setStat(id, val, diffHtml) {
  const valEl = document.getElementById(id);
  if (valEl) { valEl.textContent = val; animateNum(valEl, val); }
  const el = document.getElementById(id + '-diff');
  if (el && diffHtml !== null) el.innerHTML = diffHtml;
}

function animateNum(el, target) {
  const start = parseInt(el.dataset.prev || '0', 10);
  el.dataset.prev = target;
  if (start === target || isNaN(start)) { el.textContent = target; return; }
  const dur = 500, step = 16;
  let t = 0;
  const timer = setInterval(() => {
    t += step;
    const p = Math.min(t/dur, 1);
    el.textContent = Math.round(start + (target - start) * p);
    if (p >= 1) clearInterval(timer);
  }, step);
}

function diff(tw, lw) {
  if (lw===0 && tw===0) return `<span class="stat-diff diff-zero">— no change</span>`;
  if (lw===0)           return `<span class="stat-diff diff-up">↑ new</span>`;
  const pct = Math.round(((tw-lw)/lw)*100);
  if (tw>lw) return `<span class="stat-diff diff-up">↑ +${pct}% vs last wk</span>`;
  if (tw<lw) return `<span class="stat-diff diff-dn">↓ ${pct}% vs last wk</span>`;
  return `<span class="stat-diff diff-zero">= same as last wk</span>`;
}

// ════════════════════════════════════════════════════════════════
// USERS TABLE
// ════════════════════════════════════════════════════════════════
function renderTable(users) {
  const wrap = document.getElementById('table-wrap');
  if (!users.length) { wrap.innerHTML=`<div class="empty">No users found.</div>`; return; }
  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>User</th><th>Title</th><th>Joined</th><th>Last active</th>
        <th>Drafts</th><th>Sent</th><th>CV</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>${users.map(userRow).join('')}</tbody>
    </table>`;
}

function actBadge(lastMs) {
  const N = now();
  if (!lastMs) return `<span class="act-badge act-cold">Never</span>`;
  if (N - lastMs < 86400_000) return `<span class="act-badge act-live">Today</span>`;
  if (N - lastMs < WEEK)      return `<span class="act-badge act-week">This week</span>`;
  return `<span class="act-badge act-cold">${fmtAgo(lastMs)}</span>`;
}

function userRow(u) {
  const name   = [u._p?.firstName, u._p?.lastName].filter(Boolean).join(' ') || u.displayName || '—';
  const email  = u.email || u._p?.authEmail || '—';
  const photo  = u.photoUrl || u._p?.photoUrl || '';
  const title  = u._p?.currentTitle || '—';
  const lastMs = u.lastActiveAt || 0;
  const joinMs = u.createdAt    || 0;
  const drafts = u._d?.drafts?.length ?? u.draftCount ?? 0;
  const sent   = u._d?.stats?.sent   ?? u.sentCount  ?? 0;
  const hasCV  = !!(u._p?.cvName);
  const ini    = name==='—' ? '?' : name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();

  // FIX #3: escape uid in onclick attribute
  return `<tr>
    <td><div class="user-cell">
      ${photo ? `<img src="${_e(photo)}" class="u-avatar" alt=""/>` : `<div class="u-avatar">${_e(ini)}</div>`}
      <div><div class="u-name">${_e(name)}</div><div class="u-email">${_e(email)}</div></div>
    </div></td>
    <td style="font-size:12px;color:var(--t2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${_e(title)}">${_e(title)}</td>
    <td style="font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;white-space:nowrap">${joinMs ? fmtDate(joinMs) : '—'}</td>
    <td>${actBadge(lastMs)}</td>
    <td><span style="font-weight:700;font-size:14px">${drafts}</span></td>
    <td><span style="font-weight:700;font-size:14px;color:var(--grn)">${sent}</span></td>
    <td>${hasCV ? `<span class="pill pill-grn">✓ CV</span>` : `<span class="pill pill-gray">—</span>`}</td>
    <td>${actBadge(lastMs)}</td>
    <td><button class="detail-btn" onclick="openDetail('${_e(u.uid)}')">View →</button></td>
  </tr>`;
}

window.filterTable = () => applySortFilter();
window.applySortFilter = () => {
  const q   = document.getElementById('search-inp').value.toLowerCase();
  const key = document.getElementById('sort-sel')?.value || 'lastActive';
  let list  = [..._allUsers].sort((a,b) => {
    if (key==='lastActive') return (b.lastActiveAt||0)-(a.lastActiveAt||0);
    if (key==='joined')     return (b.createdAt||0)-(a.createdAt||0);
    if (key==='drafts')     return ((b._d?.drafts?.length||b.draftCount||0))-((a._d?.drafts?.length||a.draftCount||0));
    if (key==='sent')       return ((b._d?.stats?.sent||b.sentCount||0))-((a._d?.stats?.sent||a.sentCount||0));
    return 0;
  });
  if (q) list = list.filter(u =>
    (u.displayName||'').toLowerCase().includes(q) ||
    (u.email||'').toLowerCase().includes(q) ||
    (u._p?.firstName||'').toLowerCase().includes(q) ||
    (u._p?.currentTitle||'').toLowerCase().includes(q)
  );
  renderTable(list);
};

// ════════════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════════════
const EV_DOTS = {
  draft_generated:        'ev-dot-draft',
  email_sent:             'ev-dot-sent',
  email_copied:           'ev-dot-copy',
  job_saved:              'ev-dot-save',
  cv_uploaded:            'ev-dot-cv',
  sign_in:                'ev-dot-signin',
  share_received:         'ev-dot-share',
  app_open:               'ev-dot-open',
  onboarding_completed:   'ev-dot-gate',
  profile_gate_completed: 'ev-dot-gate',
  profile_gate_dismissed: 'ev-dot-gate',
};
const EV_LABELS = {
  draft_generated:        'Draft generated',
  email_sent:             'Email sent',
  email_copied:           'Email copied',
  job_saved:              'Job saved',
  cv_uploaded:            'CV uploaded',
  sign_in:                'Sign in',
  share_received:         'Share received',
  app_open:               'App opened',
  onboarding_completed:   'Onboarding done',
  profile_gate_completed: 'Profile gate done',
  profile_gate_dismissed: 'Profile gate skipped',
};
function evMeta(e) {
  if (e.company)  return e.company + (e.jobTitle ? ' · ' + e.jobTitle : '');
  if (e.toEmail)  return e.toEmail;
  if (e.method)   return 'via ' + e.method;
  if (e.fileName) return e.fileName;
  if (e.platform) return e.platform + (e.standalone ? ' · installed' : '');
  return '';
}
function renderEvents(events, targetId) {
  const el = document.getElementById(targetId);
  if (!events.length) { el.innerHTML=`<div class="empty">No events yet</div>`; return; }
  el.innerHTML = events.map(e => {
    const name  = e._user?._p?.firstName || e._user?.displayName?.split(' ')[0] || 'User';
    const dot   = EV_DOTS[e.type]   || 'ev-dot-open';
    const label = EV_LABELS[e.type] || e.type;
    const meta  = evMeta(e);
    const t     = e.ts || e.createdAt || 0;
    return `<div class="event-item">
      <div class="ev-dot ${_e(dot)}"></div>
      <div style="flex:1;min-width:0">
        <div class="ev-type">${_e(label)}</div>
        <div class="ev-meta">${_e(name)}${meta?' · '+_e(meta):''}</div>
      </div>
      <div class="ev-time">${t?fmtAgo(t):''}</div>
    </div>`;
  }).join('');
  if (targetId==='event-list')
    document.getElementById('ev-count-lbl').textContent = events.length + ' events';
}
function renderEventsFullTab() {
  document.getElementById('ev-full-count-lbl').textContent = _allEvents.length + ' total';
  filterEvents();
}
window.filterEvents = () => {
  const type = document.getElementById('ev-type-filter')?.value || '';
  renderEvents(type ? _allEvents.filter(e=>e.type===type) : _allEvents, 'event-list-full');
};

// ════════════════════════════════════════════════════════════════
// GUESTS
// ════════════════════════════════════════════════════════════════
function renderGuests() {
  const wrap = document.getElementById('guests-wrap');
  document.getElementById('guest-count-lbl').textContent = _allGuests.length + ' sessions';
  if (!_allGuests.length) { wrap.innerHTML=`<div class="empty">No guest sessions yet.</div>`; return; }
  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Name / email</th><th>Platform</th><th>Last active</th>
      <th>Drafts</th><th>Sent</th><th>CV</th><th>Top activity</th><th></th>
    </tr></thead>
    <tbody>${_allGuests.map(g => {
      const p      = g._p || {};
      const name   = [p.firstName, p.lastName].filter(Boolean).join(' ') || '—';
      const email  = p.email || p.authEmail || '—';
      const drafts = g._d?.drafts?.length ?? g.draftCount ?? 0;
      const sent   = g._d?.stats?.sent   ?? g.sentCount  ?? 0;
      const hasCV  = !!(p.cvName || g.hasCV);
      const topEvs = Object.entries(g.eventTypes||{}).sort((a,b)=>b[1]-a[1]).slice(0,3);
      const platform = g.platform || 'desktop';
      const pIcon  = platform==='ios' ? '🍎' : platform==='android' ? '🤖' : '🖥';

      // FIX #4: escape gid in onclick
      return `<tr>
        <td><div class="user-cell">
          <div class="u-avatar">${_e((name[0]||'?').toUpperCase())}</div>
          <div><div class="u-name">${_e(name)}</div><div class="u-email">${_e(email)}</div></div>
        </div></td>
        <td><span class="chip">${pIcon} ${_e(platform)}${g.standalone?' · PWA':''}</span></td>
        <td>${actBadge(g.lastActiveAt)}</td>
        <td><span style="font-weight:700;font-size:14px">${drafts}</span></td>
        <td><span style="font-weight:700;font-size:14px;color:var(--grn)">${sent}</span></td>
        <td>${hasCV ? `<span class="pill pill-grn">✓ CV</span>` : `<span class="pill pill-gray">—</span>`}</td>
        <td><div class="ev-tags">${topEvs.map(([t,n])=>`<span class="ev-tag">${_e(EV_LABELS[t]||t)} ×${n}</span>`).join('')||'<span class="ev-tag">—</span>'}</div></td>
        <td><button class="detail-btn" onclick="openGuestDetail('${_e(g.gid)}')">View →</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

window.openGuestDetail = (gid) => {
  const g = _allGuests.find(x => x.gid === gid); if (!g) return;
  const p = g._p || {}, d = g._d || {};
  const drafts = Array.isArray(d.drafts) ? d.drafts : [];
  const links  = Array.isArray(d.links)  ? d.links  : [];
  const name   = [p.firstName, p.lastName].filter(Boolean).join(' ') || '— Guest —';
  const email  = p.email || p.authEmail || '—';
  const ini    = (name[0]||'G').toUpperCase();

  document.getElementById('dp-avatar').textContent = ini;
  document.getElementById('dp-name').textContent   = name;
  document.getElementById('dp-email').textContent  = email + ' (guest)';

  const byStatus = { draft:0, sent:0, scheduled:0 };
  drafts.forEach(dr => { if (byStatus[dr.status]!==undefined) byStatus[dr.status]++; });

  const types = Object.entries(g.eventTypes||{}).sort((a,b)=>b[1]-a[1])
    .map(([t,n]) => `${EV_LABELS[t]||t} ×${n}`).join(', ');

  document.getElementById('dp-body').innerHTML = `
    <div class="dp-section">
      <div class="dp-stitle">Identity</div>
      ${kv('Name',      [p.firstName,p.lastName].filter(Boolean).join(' ')||'—')}
      ${kv('Email',     p.email || p.authEmail || '—')}
      ${kv('Phone',     p.phone       || '—')}
      ${kv('Location',  [p.city,p.country].filter(Boolean).join(', ')||'—')}
      ${kv('Guest ID',  `<span style="font-size:10px;color:var(--t3)">${_e(gid.slice(0,24))}…</span>`)}
    </div>
    <div class="dp-section">
      <div class="dp-stitle">Professional</div>
      ${kv('Title',      p.currentTitle || '—')}
      ${kv('Experience', p.yearsExp ? p.yearsExp+' yrs' : '—')}
      ${kv('Skills',     p.skills ? `<span style="font-size:11px;line-height:1.6;text-align:right;display:block">${_e(p.skills)}</span>` : '—')}
      ${kv('CV',         p.cvName  ? `✓ ${_e(p.cvName)}` : '—')}
    </div>
    <div class="dp-section">
      <div class="dp-stitle">Session</div>
      ${kv('Platform',     (_e(g.platform||'—')) + (g.standalone?' · installed PWA':''))}
      ${kv('Last active',  g.lastActiveAt ? fmtDate(g.lastActiveAt) : '—')}
      ${kv('Total events', g.eventCount || 0)}
      ${kv('Total drafts', drafts.length)}
      ${kv('↳ Active',     byStatus.draft)}
      ${kv('↳ Sent',       byStatus.sent)}
      ${kv('Saved posts',  links.length)}
      ${kv('Activity',     `<span style="font-size:11px;text-align:right;display:block;line-height:1.7">${_e(types||'—')}</span>`)}
    </div>
    ${drafts.length ? `
    <div class="dp-section">
      <div class="dp-stitle">Drafts (${drafts.length})</div>
      ${drafts.slice(0,10).map(dr => {
        const bcls = {sent:'dr-badge-sent',scheduled:'dr-badge-sched',draft:'dr-badge-draft'}[dr.status]||'dr-badge-draft';
        const blbl = {sent:'Sent',scheduled:'Scheduled',draft:'Draft'}[dr.status]||'Draft';
        return `<div class="draft-item">
          <div class="dr-co">${_e(dr.company||'—')}</div>
          <div class="dr-role">${_e(dr.jobTitle||'—')}</div>
          <div class="dr-st"><span class="dr-badge ${bcls}">${blbl}</span>${dr.toEmail?`<span>${_e(dr.toEmail)}</span>`:''}</div>
        </div>`;
      }).join('')}
      ${drafts.length>10?`<div class="empty" style="padding:10px">+${drafts.length-10} more</div>`:''}
    </div>` : ''}
  `;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-overlay').classList.add('show');
};

// ════════════════════════════════════════════════════════════════
// DETAIL PANEL (users)
// ════════════════════════════════════════════════════════════════
window.openDetail = (uid) => {
  const u = _allUsers.find(x => x.uid === uid); if (!u) return;
  const p = u._p || {}, d = u._d || {};
  const drafts = Array.isArray(d.drafts) ? d.drafts : [];
  const links  = Array.isArray(d.links)  ? d.links  : [];
  const name   = [p.firstName, p.lastName].filter(Boolean).join(' ') || u.displayName || '—';
  const ini    = name==='—' ? '?' : name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();

  document.getElementById('dp-avatar').textContent = ini;
  document.getElementById('dp-name').textContent   = name;
  document.getElementById('dp-email').textContent  = u.email || p.authEmail || '—';

  const byStatus = { draft:0, sent:0, scheduled:0 };
  drafts.forEach(dr => { if (byStatus[dr.status]!==undefined) byStatus[dr.status]++; });

  document.getElementById('dp-body').innerHTML = `
    <div class="dp-section">
      <div class="dp-stitle">Identity</div>
      ${kv('Name',        [p.firstName,p.lastName].filter(Boolean).join(' ')||'—')}
      ${kv('Email',       p.email || p.authEmail || '—')}
      ${kv('Phone',       p.phone       || '—')}
      ${kv('Location',    [p.city,p.country].filter(Boolean).join(', ')||'—')}
      ${kv('Nationality', p.nationality || '—')}
      ${kv('LinkedIn',    p.linkedinUrl ? `<a href="${_e(p.linkedinUrl.startsWith('http') ? p.linkedinUrl : 'https://' + p.linkedinUrl)}" target="_blank">View →</a>` : '—')}
      ${kv('Auth UID',    `<span style="font-size:10px;color:var(--t3)">${_e(uid)}</span>`)}
    </div>
    <div class="dp-section">
      <div class="dp-stitle">Professional</div>
      ${kv('Title',       p.currentTitle || '—')}
      ${kv('Experience',  p.yearsExp ? p.yearsExp+' yrs' : '—')}
      ${kv('Skills',      p.skills ? `<span style="font-size:11px;line-height:1.6;text-align:right;display:block">${_e(p.skills)}</span>` : '—')}
      ${kv('CV',          p.cvName  ? `✓ ${_e(p.cvName)} (${_e(p.cvSize||'')})` : '—')}
      ${p.summary ? `<div style="margin-top:12px;font-size:12px;color:var(--t2);line-height:1.6;padding:12px;background:var(--s2);border-radius:10px;border:1px solid var(--bd)">${_e(p.summary)}</div>` : ''}
    </div>
    <div class="dp-section">
      <div class="dp-stitle">Activity</div>
      ${kv('Joined',       u.createdAt    ? fmtDate(u.createdAt)    : '—')}
      ${kv('Last active',  u.lastActiveAt ? fmtDate(u.lastActiveAt) : '—')}
      ${kv('Total drafts', drafts.length)}
      ${kv('↳ Active',     byStatus.draft)}
      ${kv('↳ Scheduled',  byStatus.scheduled)}
      ${kv('↳ Sent',       byStatus.sent)}
      ${kv('Sent (stat)',  d.stats?.sent ?? u.sentCount ?? 0)}
      ${kv('Saved posts',  links.length)}
    </div>
    ${drafts.length ? `
    <div class="dp-section">
      <div class="dp-stitle">Drafts (${drafts.length})</div>
      ${drafts.slice(0,10).map(dr => {
        const bcls = {sent:'dr-badge-sent',scheduled:'dr-badge-sched',draft:'dr-badge-draft'}[dr.status]||'dr-badge-draft';
        const blbl = {sent:'Sent',scheduled:'Scheduled',draft:'Draft'}[dr.status]||'Draft';
        return `<div class="draft-item">
          <div class="dr-co">${_e(dr.company||'—')}</div>
          <div class="dr-role">${_e(dr.jobTitle||'—')}</div>
          <div class="dr-st">
            <span class="dr-badge ${bcls}">${blbl}</span>
            ${dr.toEmail  ? `<span>${_e(dr.toEmail)}</span>` : ''}
            ${dr.createdAt? `<span style="color:var(--t3)">${fmtDate(new Date(dr.createdAt).getTime())}</span>` : ''}
          </div>
        </div>`;
      }).join('')}
      ${drafts.length>10 ? `<div class="empty" style="padding:10px">+${drafts.length-10} more</div>` : ''}
    </div>` : ''}
    ${links.length ? `
    <div class="dp-section">
      <div class="dp-stitle">Saved posts (${links.length})</div>
      ${links.slice(0,8).map(l=>`
        <div class="link-item">
          <div style="flex:1;min-width:0">
            <div class="link-co">${_e(l.company||'—')}${l.jobTitle?' · '+_e(l.jobTitle):''}</div>
            <a class="link-url" href="${_e(l.url)}" target="_blank">${_e(l.url.length>50?l.url.slice(0,50)+'…':l.url)}</a>
          </div>
          ${l.email?`<span style="font-size:11px;color:var(--t3);flex-shrink:0">${_e(l.email)}</span>`:''}
        </div>`).join('')}
      ${links.length>8?`<div class="empty" style="padding:10px">+${links.length-8} more</div>`:''}
    </div>` : ''}
  `;

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-overlay').classList.add('show');
};

window.closeDetail = () => {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('show');
};
document.addEventListener('keydown', e => { if(e.key==='Escape') window.closeDetail(); });

// ════════════════════════════════════════════════════════════════
// CSV EXPORT  (FIX #7: append to DOM before click)
// ════════════════════════════════════════════════════════════════
window.exportCSV = () => {
  const headers = ['UID','Name','Email','Phone','Title','City','Country','Nationality','YearsExp','Skills','CV','TotalDrafts','ActiveDrafts','SentDrafts','SentCounter','SavedPosts','Joined','LastActive'];
  const rows = _allUsers.map(u => {
    const p=u._p||{}, d=u._d||{};
    const drafts=Array.isArray(d.drafts)?d.drafts:[];
    return [
      u.uid,
      [p.firstName,p.lastName].filter(Boolean).join(' ')||u.displayName||'',
      u.email||p.authEmail||'',
      p.phone||'', p.currentTitle||'', p.city||'', p.country||'', p.nationality||'', p.yearsExp||'',
      (p.skills||'').replace(/,/g,';'),
      p.cvName||'',
      drafts.length,
      drafts.filter(dr=>dr.status==='draft').length,
      drafts.filter(dr=>dr.status==='sent').length,
      d.stats?.sent??u.sentCount??0,
      Array.isArray(d.links)?d.links.length:0,
      u.createdAt    ? new Date(u.createdAt).toISOString()    : '',
      u.lastActiveAt ? new Date(u.lastActiveAt).toISOString() : '',
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv  = [headers.join(','),...rows].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `fursa-users-${new Date().toISOString().slice(0,10)}.csv`;
  // FIX #7: must be in DOM for Firefox
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
};

// ════════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════════
function _e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function kv(k,v){ return `<div class="kv"><span class="kv-k">${_e(k)}</span><span class="kv-v">${v}</span></div>`; }
function fmtDate(ms){ return new Date(ms).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmtAgo(ms){
  const s=Math.floor((Date.now()-ms)/1000);
  if(s<60)    return 'just now';
  if(s<3600)  return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

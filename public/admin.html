<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Fursa Admin</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F5F2EC;--s1:#EDEAE2;--s2:#E4E0D6;--s3:#D8D4C8;
      --t1:#1A1612;--t2:#6B6358;--t3:#A09890;
      --acc:#C84B2F;--acc-bg:rgba(200,75,47,.08);--acc-bd:rgba(200,75,47,.22);
      --grn:#2D7A4F;--grn-bg:rgba(45,122,79,.08);--grn-bd:rgba(45,122,79,.22);
      --blu:#2563EB;--blu-bg:rgba(37,99,235,.08);
      --bd:rgba(60,50,30,.10);--bd2:rgba(60,50,30,.16);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;}

    /* ── AUTH GATE ── */
    #auth-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .gate-box{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:36px 32px;width:100%;max-width:340px;text-align:center;}
    .gate-logo{width:52px;height:52px;border-radius:14px;margin-bottom:14px;}
    .gate-title{font-size:18px;font-weight:700;margin-bottom:4px;}
    .gate-sub{font-size:13px;color:var(--t3);margin-bottom:24px;}
    .gate-inp{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;background:var(--bg);color:var(--t1);margin-bottom:12px;outline:none;font-family:inherit;}
    .gate-inp:focus{border-color:var(--acc);}
    .gate-btn{width:100%;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
    .gate-err{color:var(--acc);font-size:13px;margin-top:8px;}

    /* ── DASHBOARD ── */
    #dashboard{display:none;}
    .dash-header{background:#fff;border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
    .dash-logo{width:28px;height:28px;border-radius:7px;}
    .dash-title{font-size:15px;font-weight:700;flex:1;}
    .dash-meta{font-size:11px;color:var(--t3);margin-right:4px;}
    .dash-btn{font-size:12px;color:var(--t3);cursor:pointer;padding:6px 10px;border-radius:6px;background:none;border:none;font-family:inherit;}
    .dash-btn:hover{color:var(--acc);background:var(--acc-bg);}
    .dash-body{max-width:1180px;margin:0 auto;padding:24px 20px;}

    /* ── TABS ── */
    .tab-row{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--bd);}
    .tab-btn{padding:8px 16px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:color .15s;}
    .tab-btn.active{color:var(--acc);border-bottom-color:var(--acc);}
    .tab-btn:hover:not(.active){color:var(--t2);}

    /* ── STATS ── */
    .section-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:24px;}
    .stat-card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px 16px;}
    .stat-label{font-size:11px;color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
    .stat-value{font-size:24px;font-weight:700;color:var(--t1);line-height:1.1;}
    .stat-diff{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;margin-top:4px;padding:2px 7px;border-radius:99px;}
    .diff-up  {background:var(--grn-bg);color:var(--grn);}
    .diff-dn  {background:var(--acc-bg);color:var(--acc);}
    .diff-zero{background:var(--s1);color:var(--t3);}

    /* ── PANELS ── */
    .two-col{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start;}
    @media(max-width:860px){.two-col{grid-template-columns:1fr;}}
    .panel{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden;}
    .panel-hdr{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
    .panel-hdr span{font-size:11px;color:var(--t3);font-weight:400;}

    /* ── FILTERS ── */
    .filter-row{display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bd);}
    .filter-inp{flex:1;padding:7px 10px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;background:var(--bg);color:var(--t1);outline:none;font-family:inherit;}
    .filter-inp:focus{border-color:var(--acc);}
    .icon-btn{padding:7px 10px;background:var(--s1);border:1px solid var(--bd);border-radius:7px;font-size:12px;cursor:pointer;color:var(--t2);font-family:inherit;white-space:nowrap;}
    .icon-btn:hover{background:var(--s2);}
    .export-btn{padding:7px 12px;background:var(--grn-bg);border:1px solid var(--grn-bd);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:var(--grn);font-family:inherit;}

    /* ── TABLE ── */
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead{background:var(--s1);}
    th{padding:9px 14px;text-align:left;font-weight:600;font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);white-space:nowrap;}
    td{padding:10px 14px;border-bottom:1px solid var(--bd);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--s1);}
    .user-cell{display:flex;align-items:center;gap:9px;}
    .u-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t2);}
    .u-name{font-weight:600;font-size:13px;}
    .u-email{font-size:11px;color:var(--t3);}
    .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;}
    .pill-grn {background:var(--grn-bg);color:var(--grn);}
    .pill-gray{background:var(--s2);color:var(--t3);}
    .pill-blu {background:var(--blu-bg);color:var(--blu);}
    .detail-btn{padding:4px 10px;background:var(--s1);border:1px solid var(--bd);border-radius:6px;font-size:12px;cursor:pointer;color:var(--t2);font-family:inherit;}
    .detail-btn:hover{background:var(--s2);}

    /* ── EVENTS ── */
    .event-list{max-height:560px;overflow-y:auto;}
    .event-item{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd);align-items:flex-start;}
    .event-item:last-child{border-bottom:none;}
    .ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
    .ev-dot-draft  {background:#5B4FCF;}
    .ev-dot-sent   {background:var(--grn);}
    .ev-dot-copy   {background:#BE185D;}
    .ev-dot-save   {background:var(--acc);}
    .ev-dot-cv     {background:#A0620A;}
    .ev-dot-signin {background:#2563EB;}
    .ev-dot-share  {background:#0F766E;}
    .ev-dot-open   {background:#D8D4C8;}
    .ev-dot-gate   {background:#92400E;}
    .ev-type{font-size:12px;font-weight:600;color:var(--t1);}
    .ev-meta{font-size:11px;color:var(--t3);margin-top:1px;}
    .ev-time{font-size:10px;color:var(--t3);margin-left:auto;white-space:nowrap;padding-top:2px;flex-shrink:0;}

    /* ── DETAIL PANEL ── */
    #detail-panel{position:fixed;right:0;top:0;bottom:0;width:420px;background:#fff;border-left:1px solid var(--bd);overflow-y:auto;z-index:100;transform:translateX(100%);transition:transform .26s ease;}
    #detail-panel.open{transform:none;}
    .dp-hdr{padding:16px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:#fff;z-index:1;}
    .dp-close{margin-left:auto;font-size:20px;cursor:pointer;color:var(--t3);line-height:1;padding:4px;background:none;border:none;font-family:inherit;}
    .dp-close:hover{color:var(--t1);}
    .dp-section{padding:14px 18px;border-bottom:1px solid var(--bd);}
    .dp-stitle{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
    .kv{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:12px;}
    .kv-k{font-size:12px;color:var(--t3);white-space:nowrap;flex-shrink:0;}
    .kv-v{font-size:12px;font-weight:600;color:var(--t1);text-align:right;word-break:break-word;}
    .kv-v a{color:var(--blu);text-decoration:none;}
    .draft-item{background:var(--s1);border-radius:8px;padding:9px 11px;margin-bottom:7px;}
    .dr-co{font-size:12px;font-weight:700;}
    .dr-role{font-size:11px;color:var(--t2);}
    .dr-st{font-size:11px;color:var(--t3);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .dr-badge{padding:1px 6px;border-radius:99px;font-size:10px;font-weight:600;}
    .dr-badge-draft{background:var(--s2);color:var(--t3);}
    .dr-badge-sent {background:var(--grn-bg);color:var(--grn);}
    .dr-badge-sched{background:var(--blu-bg);color:var(--blu);}
    .link-item{font-size:12px;padding:7px 0;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:flex-start;}
    .link-item:last-child{border-bottom:none;}
    .link-co{font-weight:600;}
    .link-url{color:var(--blu);text-decoration:none;font-size:11px;word-break:break-all;}

    /* ── MISC ── */
    .loading{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px;}
    .spinner{width:24px;height:24px;border-radius:50%;border:2px solid var(--s2);border-top-color:var(--acc);animation:spin .7s linear infinite;margin:0 auto 10px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:32px 20px;color:var(--t3);font-size:13px;}
  </style>
</head>
<body>

<!-- ── AUTH GATE ── -->
<div id="auth-gate">
  <div class="gate-box">
    <img src="icons/icon-192.png" class="gate-logo" alt="Fursa"/>
    <div class="gate-title">Fursa Admin</div>
    <div class="gate-sub">Owner access only</div>
    <input type="password" class="gate-inp" id="pw-inp" placeholder="Admin password" autocomplete="current-password"/>
    <button class="gate-btn" onclick="checkPw()">Enter →</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="dash-header">
    <img src="icons/icon-192.png" class="dash-logo" alt=""/>
    <div class="dash-title">Fursa — Admin</div>
    <span class="dash-meta" id="last-refresh"></span>
    <button class="dash-btn" onclick="loadAll()">↺ Refresh</button>
    <button class="dash-btn" onclick="sessionStorage.removeItem('fursa_admin_pw');location.reload()">Sign out</button>
  </div>

  <div class="dash-body">

    <div class="section-title">Overview — this week vs last week</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Registered users</div><div class="stat-value" id="st-users">—</div></div>
      <div class="stat-card"><div class="stat-label">Guest sessions</div><div class="stat-value" id="st-guests">—</div></div>
      <div class="stat-card"><div class="stat-label">New users (7d)</div><div class="stat-value" id="st-new">—</div><div id="st-new-diff"></div></div>
      <div class="stat-card"><div class="stat-label">Total drafts</div><div class="stat-value" id="st-total-drafts">—</div></div>
      <div class="stat-card"><div class="stat-label">Total sent</div><div class="stat-value" id="st-total-sent">—</div></div>
      <div class="stat-card"><div class="stat-label">Drafts (7d)</div><div class="stat-value" id="st-drafts">—</div><div id="st-drafts-diff"></div></div>
      <div class="stat-card"><div class="stat-label">Emails sent (7d)</div><div class="stat-value" id="st-sent">—</div><div id="st-sent-diff"></div></div>
      <div class="stat-card"><div class="stat-label">CV uploads (7d)</div><div class="stat-value" id="st-cvs">—</div><div id="st-cvs-diff"></div></div>
      <div class="stat-card"><div class="stat-label">Sign-ins (7d)</div><div class="stat-value" id="st-signins">—</div><div id="st-signins-diff"></div></div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('users')"  id="tab-users">Users</button>
      <button class="tab-btn"        onclick="switchTab('events')" id="tab-events">Live Events</button>
      <button class="tab-btn"        onclick="switchTab('guests')" id="tab-guests">Guests</button>
    </div>

    <!-- ── USERS TAB ── -->
    <div id="tab-pane-users">
      <div class="two-col">
        <div class="panel">
          <div class="panel-hdr">
            Users <span id="user-count-lbl"></span>
            <div style="display:flex;gap:6px;margin-left:auto">
              <select class="icon-btn" id="sort-sel" onchange="applySortFilter()">
                <option value="lastActive">Last active</option>
                <option value="joined">Joined</option>
                <option value="drafts">Most drafts</option>
                <option value="sent">Most sent</option>
              </select>
              <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
            </div>
          </div>
          <div class="filter-row">
            <input class="filter-inp" id="search-inp" placeholder="Search name, email or title…" oninput="filterTable()"/>
          </div>
          <div id="table-wrap"><div class="loading"><div class="spinner"></div>Loading…</div></div>
        </div>

        <div class="panel">
          <div class="panel-hdr">Live events <span id="ev-count-lbl"></span></div>
          <div class="event-list" id="event-list">
            <div class="loading"><div class="spinner"></div>Loading…</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── EVENTS TAB ── -->
    <div id="tab-pane-events" style="display:none">
      <div class="panel">
        <div class="panel-hdr">
          All events <span id="ev-full-count-lbl"></span>
          <select class="icon-btn" id="ev-type-filter" onchange="filterEvents()">
            <option value="">All types</option>
            <option value="draft_generated">Draft generated</option>
            <option value="email_sent">Email sent</option>
            <option value="email_copied">Email copied</option>
            <option value="job_saved">Job saved</option>
            <option value="cv_uploaded">CV uploaded</option>
            <option value="sign_in">Sign in</option>
            <option value="share_received">Share received</option>
            <option value="app_open">App opened</option>
            <option value="onboarding_completed">Onboarding done</option>
            <option value="profile_gate_completed">Profile gate done</option>
            <option value="profile_gate_dismissed">Profile gate skipped</option>
          </select>
        </div>
        <div class="event-list" style="max-height:none" id="event-list-full"></div>
      </div>
    </div>

    <!-- ── GUESTS TAB ── -->
    <div id="tab-pane-guests" style="display:none">
      <div class="panel">
        <div class="panel-hdr">Guest sessions <span id="guest-count-lbl"></span></div>
        <div id="guests-wrap"><div class="loading"><div class="spinner"></div>Loading…</div></div>
      </div>
    </div>

  </div>
</div>

<!-- ── DETAIL PANEL ── -->
<div id="detail-panel">
  <div class="dp-hdr">
    <div>
      <div style="font-size:14px;font-weight:700" id="dp-name"></div>
      <div style="font-size:12px;color:var(--t3)" id="dp-email"></div>
    </div>
    <button class="dp-close" onclick="closeDetail()">×</button>
  </div>
  <div id="dp-body"></div>
</div>

<script type="module">
// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
let _adminPassword = '';
let _allUsers      = [];
let _allEvents     = [];
let _allGuests     = [];
const NOW   = Date.now();
const WEEK  = 7  * 86400_000;
const WEEK2 = 14 * 86400_000;

// ════════════════════════════════════════════════════════════════
// AUTH GATE
// ════════════════════════════════════════════════════════════════
window.checkPw = async () => {
  const pw  = document.getElementById('pw-inp').value;
  const btn = document.querySelector('.gate-btn');
  btn.textContent = 'Checking…'; btn.disabled = true;
  try {
    const r = await fetch('/api/admin?action=users', { headers: { 'x-admin-password': pw } });
    if (r.status === 401) {
      document.getElementById('gate-err').textContent = 'Wrong password.';
      btn.textContent = 'Enter →'; btn.disabled = false; return;
    }
    if (!r.ok) throw new Error(await r.text());
    _adminPassword = pw;
    sessionStorage.setItem('fursa_admin_pw', pw);
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    const data = await r.json();
    _allUsers = (data.users || []).sort((a,b) => (b.lastActiveAt||0) - (a.lastActiveAt||0));
    updateStats();
    renderTable(_allUsers);
    document.getElementById('user-count-lbl').textContent = _allUsers.length + ' total';
    await Promise.all([ loadEvents(), loadGuests() ]);
    setRefreshLabel();
  } catch(e) {
    document.getElementById('gate-err').textContent = 'Error: ' + e.message;
    btn.textContent = 'Enter →'; btn.disabled = false;
  }
};
document.getElementById('pw-inp').addEventListener('keydown', e => { if(e.key==='Enter') window.checkPw(); });
const _saved = sessionStorage.getItem('fursa_admin_pw');
if (_saved) { document.getElementById('pw-inp').value = _saved; window.checkPw(); }

// ════════════════════════════════════════════════════════════════
// DATA LOADING
// ════════════════════════════════════════════════════════════════
window.loadAll = async () => {
  document.getElementById('last-refresh').textContent = 'Loading…';
  try {
    const [uRes, eRes, gRes] = await Promise.all([
      fetch('/api/admin?action=users',  { headers: { 'x-admin-password': _adminPassword } }),
      fetch('/api/admin?action=events', { headers: { 'x-admin-password': _adminPassword } }),
      fetch('/api/admin?action=guests', { headers: { 'x-admin-password': _adminPassword } }),
    ]);
    _allUsers  = ((await uRes.json()).users  || []).sort((a,b) => (b.lastActiveAt||0) - (a.lastActiveAt||0));
    _allEvents = (await eRes.json()).events || [];
    _allGuests = (await gRes.json()).guests || [];
    updateStats();
    renderTable(_allUsers);
    renderEvents(_allEvents, 'event-list');
    renderEventsFullTab();
    renderGuests();
    document.getElementById('user-count-lbl').textContent = _allUsers.length + ' total';
    setRefreshLabel();
  } catch(e) {
    document.getElementById('last-refresh').textContent = 'Failed: ' + e.message;
  }
};

async function loadEvents() {
  try {
    const r = await fetch('/api/admin?action=events', { headers: { 'x-admin-password': _adminPassword } });
    if (!r.ok) return;
    _allEvents = (await r.json()).events || [];
    renderEvents(_allEvents, 'event-list');
    renderEventsFullTab();
    updateStats();
  } catch(_) {}
}

async function loadGuests() {
  try {
    const r = await fetch('/api/admin?action=guests', { headers: { 'x-admin-password': _adminPassword } });
    if (!r.ok) return;
    _allGuests = (await r.json()).guests || [];
    renderGuests();
  } catch(_) {}
}

function setRefreshLabel() {
  document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

// Auto-refresh every 60s
setInterval(() => { if (_adminPassword) loadAll(); }, 60_000);

// ════════════════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════════════════
window.switchTab = (name) => {
  ['users','events','guests'].forEach(t => {
    document.getElementById('tab-pane-' + t).style.display = t === name ? '' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
  });
};

// ════════════════════════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════════════════════════
function updateStats() {
  const newTW  = _allUsers.filter(u => u.createdAt && (NOW - u.createdAt) < WEEK).length;
  const newLW  = _allUsers.filter(u => { const t=u.createdAt||0; return t>NOW-WEEK2 && t<=NOW-WEEK; }).length;

  const evTW = _allEvents.filter(e => (NOW - (e.ts||e.createdAt||0)) < WEEK);
  const evLW = _allEvents.filter(e => { const t=e.ts||e.createdAt||0; return t>NOW-WEEK2 && t<=NOW-WEEK; });
  const cnt  = (evs, type) => evs.filter(e => e.type === type).length;

  // Include guest drafts and sent counts in totals
  const totalDrafts = [
    ..._allUsers,
    ..._allGuests,
  ].reduce((s,u) => s + (u._d?.drafts?.length ?? u.draftCount ?? 0), 0);
  const totalSent = [
    ..._allUsers,
    ..._allGuests,
  ].reduce((s,u) => s + (u._d?.stats?.sent ?? u.sentCount ?? 0), 0);

  document.getElementById('st-users').textContent        = _allUsers.length;
  document.getElementById('st-guests').textContent       = _allGuests.length;
  document.getElementById('st-total-drafts').textContent = totalDrafts;
  document.getElementById('st-total-sent').textContent   = totalSent;
  setStat('st-new',     newTW,                          diff(newTW, newLW));
  setStat('st-drafts',  cnt(evTW,'draft_generated'),    diff(cnt(evTW,'draft_generated'), cnt(evLW,'draft_generated')));
  setStat('st-sent',    cnt(evTW,'email_sent'),         diff(cnt(evTW,'email_sent'),      cnt(evLW,'email_sent')));
  setStat('st-cvs',     cnt(evTW,'cv_uploaded'),        diff(cnt(evTW,'cv_uploaded'),     cnt(evLW,'cv_uploaded')));
  setStat('st-signins', cnt(evTW,'sign_in'),            diff(cnt(evTW,'sign_in'),         cnt(evLW,'sign_in')));
}
function setStat(id, val, diffHtml) {
  document.getElementById(id).textContent = val;
  const el = document.getElementById(id + '-diff');
  if (el && diffHtml !== null) el.innerHTML = diffHtml;
}
function diff(tw, lw) {
  if (lw===0 && tw===0) return `<span class="stat-diff diff-zero">— no change</span>`;
  if (lw===0)           return `<span class="stat-diff diff-up">↑ new</span>`;
  const pct = Math.round(((tw-lw)/lw)*100);
  if (tw>lw) return `<span class="stat-diff diff-up">↑ +${pct}% vs last week</span>`;
  if (tw<lw) return `<span class="stat-diff diff-dn">↓ ${pct}% vs last week</span>`;
  return `<span class="stat-diff diff-zero">= same as last week</span>`;
}

// USERS TABLE

function renderTable(users) {
  if (!users.length) { document.getElementById('table-wrap').innerHTML=`<div class="empty">No users found.</div>`; return; }
  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>User</th><th>Title</th><th>Joined</th><th>Last active</th>
        <th>Drafts</th><th>Sent</th><th>CV</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>${users.map(userRow).join('')}</tbody>
    </table>`;
}
function userRow(u) {
  const name   = [u._p?.firstName, u._p?.lastName].filter(Boolean).join(' ') || u.displayName || '—';
  const email  = u.email || u._p?.authEmail || '—';
  const photo  = u.photoUrl || u._p?.photoUrl || '';
  const title  = u._p?.currentTitle || '—';
  const lastMs = u.lastActiveAt || 0;
  const joinMs = u.createdAt    || 0;
  const drafts = u._d?.drafts?.length ?? u.draftCount ?? 0;
  const sent   = u._d?.stats?.sent   ?? u.sentCount  ?? 0;
  const hasCV  = !!(u._p?.cvName);
  const active = lastMs && (NOW - lastMs) < WEEK;
  const ini    = name==='—' ? '?' : name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
  return `<tr>
    <td><div class="user-cell">
      ${photo ? `<img src="${photo}" class="u-avatar" alt=""/>` : `<div class="u-avatar">${_e(ini)}</div>`}
      <div><div class="u-name">${_e(name)}</div><div class="u-email">${_e(email)}</div></div>
    </div></td>
    <td style="font-size:12px;color:var(--t2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${_e(title)}">${_e(title)}</td>
    <td style="font-size:12px;color:var(--t2)">${joinMs ? fmtDate(joinMs) : '—'}</td>
    <td style="font-size:12px;color:var(--t2)">${lastMs ? fmtAgo(lastMs) : '—'}</td>
    <td style="font-weight:600">${drafts}</td>
    <td style="font-weight:600;color:var(--grn)">${sent}</td>
    <td>${hasCV ? `<span class="pill pill-grn">✓</span>` : `<span class="pill pill-gray">—</span>`}</td>
    <td><span class="pill ${active ? 'pill-grn' : 'pill-gray'}">${active ? 'Active' : 'Inactive'}</span></td>
    <td><button class="detail-btn" onclick="openDetail('${u.uid}')">View →</button></td>
  </tr>`;
}
window.filterTable = () => applySortFilter();
window.applySortFilter = () => {
  const q   = document.getElementById('search-inp').value.toLowerCase();
  const key = document.getElementById('sort-sel')?.value || 'lastActive';
  let list  = [..._allUsers].sort((a,b) => {
    if (key==='lastActive') return (b.lastActiveAt||0)-(a.lastActiveAt||0);
    if (key==='joined')     return (b.createdAt||0)-(a.createdAt||0);
    if (key==='drafts')     return ((b._d?.drafts?.length||b.draftCount||0))-((a._d?.drafts?.length||a.draftCount||0));
    if (key==='sent')       return ((b._d?.stats?.sent||b.sentCount||0))-((a._d?.stats?.sent||a.sentCount||0));
    return 0;
  });
  if (q) list = list.filter(u =>
    (u.displayName||'').toLowerCase().includes(q) ||
    (u.email||'').toLowerCase().includes(q) ||
    (u._p?.firstName||'').toLowerCase().includes(q) ||
    (u._p?.currentTitle||'').toLowerCase().includes(q)
  );
  renderTable(list);
};

const EV_DOTS = {

  email_sent:             'ev-dot-sent',
  email_copied:           'ev-dot-copy',
  job_saved:              'ev-dot-save',
  cv_uploaded:            'ev-dot-cv',
  sign_in:                'ev-dot-signin',
  share_received:         'ev-dot-share',
  app_open:               'ev-dot-open',
  onboarding_completed:   'ev-dot-gate',
  profile_gate_completed: 'ev-dot-gate',
  profile_gate_dismissed: 'ev-dot-gate',
};
const EV_LABELS = {
  draft_generated:        'Draft generated',
  email_sent:             'Email sent',
  email_copied:           'Email copied',
  job_saved:              'Job saved',
  cv_uploaded:            'CV uploaded',
  sign_in:                'Sign in',
  share_received:         'Share received',
  app_open:               'App opened',
  onboarding_completed:   'Onboarding done',
  profile_gate_completed: 'Profile gate done',

function evMeta(e) {
  if (e.company)   return e.company + (e.jobTitle ? ' · ' + e.jobTitle : '');
  if (e.toEmail)   return e.toEmail;
  if (e.method)    return 'via ' + e.method;
  if (e.fileName)  return e.fileName;
  if (e.platform)  return e.platform + (e.standalone ? ' · installed' : '');
  return '';
}
function renderEvents(events, targetId) {
  const el = document.getElementById(targetId);
  if (!events.length) { el.innerHTML=`<div class="empty">No events yet</div>`; return; }
  el.innerHTML = events.map(e => {
    const name  = e._user?._p?.firstName || e._user?.displayName?.split(' ')[0] || 'User';
    const dot   = EV_DOTS[e.type]   || 'ev-dot-open';
    const label = EV_LABELS[e.type] || e.type;
    const meta  = evMeta(e);
    const t     = e.ts || e.createdAt || 0;
    return `<div class="event-item">
      <div class="ev-dot ${dot}"></div>
      <div style="flex:1;min-width:0">
        <div class="ev-type">${_e(label)}</div>

  }).join('');

}

// CSV EXPORT
// ════════════════════════════════════════════════════════════════
window.exportCSV = () => {
  const headers = ['UID','Name','Email','Phone','Title','City','Country','Nationality','YearsExp','Skills','CV','TotalDrafts','ActiveDrafts','SentDrafts','SentCounter','SavedPosts','Joined','LastActive'];
  const rows = _allUsers.map(u => {
    const p=u._p||{}, d=u._d||{};
    const drafts=Array.isArray(d.drafts)?d.drafts:[];
    return [
      u.uid,
      [p.firstName,p.lastName].filter(Boolean).join(' ')||u.displayName||'',
      u.email||p.authEmail||'',
      p.phone||'', p.currentTitle||'', p.city||'', p.country||'', p.nationality||'', p.yearsExp||'',
      (p.skills||'').replace(/,/g,';'),
      p.cvName||'',
      drafts.length,
      drafts.filter(dr=>dr.status==='draft').length,
      drafts.filter(dr=>dr.status==='sent').length,
      d.stats?.sent??u.sentCount??0,
      Array.isArray(d.links)?d.links.length:0,
      u.createdAt    ? new Date(u.createdAt).toISOString()    : '',
      u.lastActiveAt ? new Date(u.lastActiveAt).toISOString() : '',
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv  = [headers.join(','),...rows].join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a    = Object.assign(document.createElement('a'),{
    href: URL.createObjectURL(blob),
    download: `fursa-users-${new Date().toISOString().slice(0,10)}.csv`
  });
  a.click(); URL.revokeObjectURL(a.href);
};

// ════════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════════
function _e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function kv(k,v){ return `<div class="kv"><span class="kv-k">${k}</span><span class="kv-v">${v}</span></div>`; }
function fmtDate(ms){ return new Date(ms).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmtAgo(ms){
  const s=Math.floor((Date.now()-ms)/1000);
  if(s<60)    return 'just now';
  if(s<3600)  return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
